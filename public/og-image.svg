<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F0F1A"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0F0F1A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Gradient orbs -->
  <circle cx="300" cy="200" r="250" fill="url(#accent2)" opacity="0.6"/>
  <circle cx="900" cy="450" r="300" fill="url(#accent2)" opacity="0.4"/>

  <!-- Accent line -->
  <rect x="480" y="230" width="240" height="3" rx="1.5" fill="url(#accent)" opacity="0.8"/>

  <!-- Logo text -->
  <text x="600" y="300" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="82" font-weight="800" letter-spacing="-2" filter="url(#glow)">
    <tspan fill="url(#accent)">Hook</tspan><tspan fill="#ffffff">Cut</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="365" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="500" fill="#a1a1aa" letter-spacing="0.5">
    Turn 1 hour into 10 viral shorts
  </text>

  <!-- Accent line bottom -->
  <rect x="480" y="395" width="240" height="3" rx="1.5" fill="url(#accent)" opacity="0.8"/>

  <!-- Play button icon -->
  <circle cx="600" cy="480" r="32" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
  <polygon points="590,464 590,496 618,480" fill="url(#accent)" opacity="0.7"/>

  <!-- Film strip elements left -->
  <rect x="60" y="180" width="50" height="270" rx="6" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>
  <rect x="68" y="195" width="34" height="22" rx="2" fill="#ffffff" opacity="0.04"/>
  <rect x="68" y="227" width="34" height="22" rx="2" fill="#ffffff" opacity="0.04"/>
  <rect x="68" y="259" width="34" height="22" rx="2" fill="#ffffff" opacity="0.04"/>
  <rect x="68" y="291" width="34" height="22" rx="2" fill="#ffffff" opacity="0.04"/>
  <rect x="68" y="323" width="34" height="22" rx="2" fill="#ffffff" opacity="0.04"/>
  <rect x="68" y="355" width="34" height="22" rx="2" fill="#ffffff" opacity="0.04"/>
  <rect x="68" y="387" width="34" height="22" rx="2" fill="#ffffff" opacity="0.04"/>

  <!-- Film strip elements right -->
  <rect x="1090" y="180" width="50" height="270" rx="6" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>
  <rect x="1098" y="195" width="34" height="22" rx="2" fill="#ffffff" opacity="0.04"/>
  <rect x="1098" y="227" width="34" height="22" rx="2" fill="#ffffff" opacity="0.04"/>
  <rect x="1098" y="259" width="34" height="22" rx="2" fill="#ffffff" opacity="0.04"/>
  <rect x="1098" y="291" width="34" height="22" rx="2" fill="#ffffff" opacity="0.04"/>
  <rect x="1098" y="323" width="34" height="22" rx="2" fill="#ffffff" opacity="0.04"/>
  <rect x="1098" y="355" width="34" height="22" rx="2" fill="#ffffff" opacity="0.04"/>
  <rect x="1098" y="387" width="34" height="22" rx="2" fill="#ffffff" opacity="0.04"/>

  <!-- Bottom badge -->
  <text x="600" y="575" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#71717a" letter-spacing="3">
    AI VIDEO REPURPOSING
  </text>
</svg>