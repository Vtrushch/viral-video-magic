        <h1>HookCut — Turn long videos into viral short clips with AI</h1>
        <p>HookCut is an AI-powered video repurposing tool. Upload up to 2 hours of video — or paste a YouTube, TikTok, Instagram, X, Vimeo or Twitch link — and AI finds your most viral moments, adds word-by-word captions, tracks faces to reframe for vertical 9:16, and scores each clip by viral potential. Repurpose webinars, interviews, podcasts and YouTube videos into TikTok, Instagram Reels and YouTube Shorts in minutes instead of hours.</p>

        <h2>How it works</h2>
        <ol>
          <li><strong>Upload or paste a link.</strong> Drop any video up to 2 hours, or paste a YouTube/TikTok/Instagram URL — HookCut downloads and processes it.</li>
          <li><strong>AI finds the viral moments.</strong> Gemini AI watches the whole video and picks up to 15 best clips, each with a viral score. Analysis is free and unlimited.</li>
          <li><strong>Edit for free.</strong> Change captions, adjust timing, swap hooks and styles in Remix Mode — all before spending a single credit.</li>
          <li><strong>Render &amp; share.</strong> Export in 1080p for 1 credit. Download or schedule posts on the built-in content calendar.</li>
        </ol>

        <h2>Key features</h2>
        <ul>
          <li>AI viral-moment detection with a viral score for every clip</li>
          <li>Automatic word-by-word captions in 99 languages, 10+ styles (Hormozi, MrBeast, Karaoke and more)</li>
          <li>Smart face tracking that keeps the speaker centered when reframing to 9:16</li>
          <li>Multi-platform import: YouTube, TikTok, Instagram, Facebook, X, Vimeo, Twitch, Rumble, Dailymotion, Loom</li>
          <li>Remix Mode to experiment with hooks and styles; Smart Reel and highlight reels</li>
          <li>Content calendar to schedule clips across platforms</li>
        </ul>

        <h2>Pricing</h2>
        <ul>
          <li><strong>Free — $0:</strong> 3 clips, no credit card, no watermark on free renders</li>
          <li><strong>Starter — $9/mo:</strong> for individual creators</li>
          <li><strong>Pro — $19/mo (most popular):</strong> for active creators and agencies</li>
          <li><strong>Agency — $39/mo:</strong> highest render volume</li>
        </ul>
        <p>HookCut charges per rendered clip, not per upload minute — analysis and editing are always free.</p>

        <h2>FAQ</h2>
        <p><strong>Is HookCut free?</strong> Yes — you get 3 free clips with no credit card, and AI analysis plus editing are always free; you only spend a credit when you render a final clip.</p>
        <p><strong>What makes HookCut different from Opus Clip?</strong> HookCut charges per rendered clip instead of per upload minute, lets you edit and preview for free before rendering, supports 10+ platforms for import, and includes a content calendar.</p>
        <p><strong>What videos work best?</strong> Podcasts, interviews, webinars, and long-form YouTube videos with clear speech.</p>
